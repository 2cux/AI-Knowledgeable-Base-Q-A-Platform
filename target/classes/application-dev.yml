spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/aikb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    com.example.aikb: DEBUG
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}
  issuer: ${JWT_ISSUER:aikb-backend}
