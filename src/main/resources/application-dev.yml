spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/aikb?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    '[com.example.aikb]': DEBUG
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}
  issuer: ${JWT_ISSUER:aikb-backend}

app:
  debug:
    ai-test:
      enabled: true
  llm:
    enabled: true
    base-url: https://api.xiaocaseai.com/v1/messages
    api-key: sk-3923hDFgZucHTAttjwhq9O4uAf1vGn2ClakWT4V334P47KYI
    model: claude-opus-4-6
    max-tokens: 1024
    connect-timeout: 5s
    read-timeout: 60s
  embedding:
    enabled: true
    base-url: https://api.xiaocaseai.com/v1/embeddings
    api-key: sk-8kiUdG7WqyDXzI2cI86dgbzsrQxX3e7qRMGaPMlawTxIIzAH
    model: text-embedding-3-large
    normalized: true
