spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/aikb?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    '[com.example.aikb]': DEBUG
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}
  issuer: ${JWT_ISSUER:aikb-backend}

app:
  llm:
    enabled: ${APP_LLM_ENABLED:true}
    base-url: ${APP_LLM_BASE_URL:https://api.xiaocaseai.com/v1/messages}
    api-key: ${APP_LLM_API_KEY:sk-3923hDFgZucHTAttjwhq9O4uAf1vGn2ClakWT4V334P47KYI}
    model: ${APP_LLM_MODEL:claude-opus-4-6}
    max-tokens: ${APP_LLM_MAX_TOKENS:1024}
    connect-timeout: ${APP_LLM_CONNECT_TIMEOUT:5s}
    read-timeout: ${APP_LLM_READ_TIMEOUT:60s}
  embedding:
    enabled: ${APP_EMBEDDING_ENABLED:true}
    base-url: ${APP_EMBEDDING_BASE_URL:https://api.xiaocaseai.com/v1/embeddings}
    api-key: ${APP_EMBEDDING_API_KEY:YOUR_API_KEY_HERE}
    model: ${APP_EMBEDDING_MODEL:text-embedding-3-large}
    normalized: ${APP_EMBEDDING_NORMALIZED:true}
    embedding-type: ${APP_EMBEDDING_TYPE:float}
    connect-timeout: ${APP_EMBEDDING_CONNECT_TIMEOUT:5s}
    read-timeout: ${APP_EMBEDDING_READ_TIMEOUT:60s}
