spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aikb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    com.example.aikb: DEBUG
jwt:
  secret: your-secret-key-change-me
  expiration: 86400000
  issuer: aikb-backend