spring:
  application:
    name: enterprise-ai-knowledge-base-qna-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.aikb.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  file:
    upload-dir: ${APP_FILE_UPLOAD_DIR:uploads}
    max-size: 20MB
  llm:
    base-url: ${APP_LLM_BASE_URL:}
    api-key: ${APP_LLM_API_KEY:}
    model: ${APP_LLM_MODEL:gpt-4o-mini}
    temperature: ${APP_LLM_TEMPERATURE:0.2}
    max-tokens: ${APP_LLM_MAX_TOKENS:800}
    connect-timeout: ${APP_LLM_CONNECT_TIMEOUT:5s}
    read-timeout: ${APP_LLM_READ_TIMEOUT:60s}
  embedding:
    # 是否启用真实 embedding API 调用。
    enabled: ${APP_EMBEDDING_ENABLED:true}
    # 完整的 embedding 接口地址，例如：https://your-vendor-base-url
    base-url: ${APP_EMBEDDING_BASE_URL:https://api.xiaocaseai.com/v1/embeddings}
    # 不要提交真实 API Key，本地和部署环境优先使用环境变量注入。
    api-key: ${APP_EMBEDDING_API_KEY:sk-8kiUdG7WqyDXzI2cI86dgbzsrQxX3e7qRMGaPMlawTxIIzAH}
    # 文档向量化和检索 Query 向量化共用的 embedding 模型。
    model: ${APP_EMBEDDING_MODEL:text-embedding-3-large}
    # 是否要求服务提供商返回归一化后的向量。
    normalized: ${APP_EMBEDDING_NORMALIZED:true}
    # 服务提供商定义的 embedding 类型，具体取值需按实际接口确认。
    embedding-type: ${APP_EMBEDDING_TYPE:float}
    connect-timeout: ${APP_EMBEDDING_CONNECT_TIMEOUT:5s}
    read-timeout: ${APP_EMBEDDING_READ_TIMEOUT:60s}

logging:
  level:
    root: INFO
    '[com.example.aikb]': DEBUG
