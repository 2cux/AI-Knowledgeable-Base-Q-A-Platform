spring:
  application:
    name: enterprise-ai-knowledge-base-qna-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.aikb.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  file:
    upload-dir: ${APP_FILE_UPLOAD_DIR:uploads}
    max-size: 20MB

logging:
  level:
    root: INFO
    '[com.example.aikb]': DEBUG
