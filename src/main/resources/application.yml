spring:
  application:
    name: enterprise-ai-knowledge-base-qna-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.aikb.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  file:
    upload-dir: ${APP_FILE_UPLOAD_DIR:uploads}
    max-size: 20MB
  debug:
    ai-test:
      enabled: false
  llm:
    enabled: true
    base-url: https://api.xiaocaseai.com/v1/messages
    api-key: ${APP_LLM_API_KEY:}
    model: claude-opus-4-6
    max-tokens: 1024
    connect-timeout: 5s
    read-timeout: 60s
  embedding:
    enabled: true
    base-url: https://api.xiaocaseai.com/v1/embeddings
    api-key: ${APP_EMBEDDING_API_KEY:}
    model: text-embedding-3-large
    normalized: true
    embedding-type: float
    connect-timeout: 5s
    read-timeout: 60s

logging:
  level:
    root: INFO
    '[com.example.aikb]': DEBUG
